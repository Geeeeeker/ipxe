name: Build Custom iPXE (Multi-Arch, HTTP/HTTPS)

on:
  workflow_dispatch:
    inputs:
      protocol:
        description: '启动协议 (http 或 https)'
        required: true
        default: 'http'
        type: choice
        options:
          - http
          - https
      architectures:
        description: '目标架构 (空格分隔) 可选: x86_64, i386, arm64, arm32'
        required: true
        default: 'x86_64'
      extra_targets:
        description: '额外编译目标 (空格分隔，例如: ipxe.iso ipxe.usb 10ec8139.rom)'
        required: false
        default: ''
      cert_url:
        description: 'HTTPS证书URL (仅当协议为https时必填)'
        required: false
        default: 'http://txddns.dynv6.net/ipxe/cer.crt'
      base_url_http:
        description: 'HTTP基础URL (不含路径)'
        required: false
        default: 'http://txddns.dynv6.net'
      base_url_https:
        description: 'HTTPS基础URL (不含路径)'
        required: false
        default: 'https://txddns.dynv6.net'
      base_path:
        description: '基础路径 (menu.ipxe所在目录，如 /ipxe)'
        required: false
        default: '/ipxe'
      menu_filename:
        description: 'menu.ipxe文件名'
        required: false
        default: 'menu.ipxe'

env:
  MAKEFLAGS: "-j4"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          archs="${{ github.event.inputs.architectures }}"
          echo "Raw input: '$archs'"
          # 去除多余空格，按空格分割
          archs=$(echo "$archs" | xargs)  # 去除首尾空格
          if [ -z "$archs" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
            exit 0
          fi
          # 构建 JSON 数组
          json_array="["
          first=true
          for arch in $archs; do
            if [ "$first" = true ]; then
              first=false
            else
              json_array="$json_array,"
            fi
            json_array="$json_array\"$arch\""
          done
          json_array="$json_array]"
          echo "matrix=$json_array" >> $GITHUB_OUTPUT
          echo "Generated matrix: $json_array"

  build:
    name: Build ${{ matrix.arch }} (${{ github.event.inputs.protocol }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJson(needs.prepare.outputs.matrix) }}
        include:
          - arch: x86_64
            container: ghcr.io/ipxe/ipxe-builder-x86_64
            bios_targets: undionly.kpxe
            efi_targets: ipxe.efi
          - arch: i386
            container: ghcr.io/ipxe/ipxe-builder-i386
            bios_targets: undionly.kpxe
            efi_targets: ipxe.efi
          - arch: arm64
            container: ghcr.io/ipxe/ipxe-builder-arm64
            bios_targets: ''
            efi_targets: ipxe.efi
          - arch: arm32
            container: ghcr.io/ipxe/ipxe-builder-arm32
            bios_targets: ''
            efi_targets: ipxe.efi
    container:
      image: ${{ matrix.container }}
    steps:
      - name: Install zip
        run: apk add --no-cache zip

      - name: Checkout iPXE source
        uses: actions/checkout@v4
        with:
          repository: ipxe/ipxe
          path: ipxe

      - name: Generate embedded script
        working-directory: ipxe/src
        run: |
          if [ "${{ github.event.inputs.protocol }}" = "https" ]; then
            BASE_URL="${{ github.event.inputs.base_url_https }}${{ github.event.inputs.base_path }}"
          else
            BASE_URL="${{ github.event.inputs.base_url_http }}${{ github.event.inputs.base_path }}"
          fi
          MENU_URL="${BASE_URL}/${{ github.event.inputs.menu_filename }}"
          cat > boot.ipxe << EOF
          #!ipxe
          dhcp
          set menu-url ${MENU_URL}
          chain \${menu-url} || shell
          EOF

      - name: Add imgtrust for HTTPS
        if: github.event.inputs.protocol == 'https'
        working-directory: ipxe/src
        run: |
          sed -i '/^dhcp$/a imgtrust ${{ github.event.inputs.cert_url }}' boot.ipxe

      - name: Build BIOS binaries
        if: matrix.bios_targets != ''
        working-directory: ipxe/src
        run: |
          for target in ${{ matrix.bios_targets }} ${{ github.event.inputs.extra_targets }}; do
            make bin/$target EMBED=boot.ipxe || true
          done

      - name: Build UEFI binaries
        working-directory: ipxe/src
        run: |
          EFI_DIR="bin-${{ matrix.arch }}-efi"
          for target in ${{ matrix.efi_targets }} ${{ github.event.inputs.extra_targets }}; do
            make ${EFI_DIR}/$target EMBED=boot.ipxe || true
          done

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cd ipxe/src
          if [ -d bin ]; then
            cp bin/undionly.kpxe bin/*.rom bin/*.pxe bin/*.lkrn bin/*.dsk bin/*.iso bin/*.usb ../artifacts/ 2>/dev/null || true
          fi
          EFI_DIR="bin-${{ matrix.arch }}-efi"
          if [ -d ${EFI_DIR} ]; then
            cp ${EFI_DIR}/*.efi ${EFI_DIR}/*.iso ${EFI_DIR}/*.usb ../artifacts/ 2>/dev/null || true
          fi

      - name: Map arch name for output (x86_64 -> amd64)
        id: map_name
        run: |
          case "${{ matrix.arch }}" in
            x86_64) echo "display=amd64" >> $GITHUB_OUTPUT ;;
            i386)   echo "display=i386" >> $GITHUB_OUTPUT ;;
            arm64)  echo "display=arm64" >> $GITHUB_OUTPUT ;;
            arm32)  echo "display=arm32" >> $GITHUB_OUTPUT ;;
            *)      echo "display=${{ matrix.arch }}" >> $GITHUB_OUTPUT ;;
          esac

      - name: Package artifacts
        run: |
          cd artifacts
          zip -r ../ipxe-${{ github.event.inputs.protocol }}-${{ steps.map_name.outputs.display }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipxe-${{ github.event.inputs.protocol }}-${{ steps.map_name.outputs.display }}
          path: ipxe-${{ github.event.inputs.protocol }}-${{ steps.map_name.outputs.display }}.zip
          if-no-files-found: error
